basePath: /api
definitions:
  apierror.Api:
    properties:
      error:
        type: string
    type: object
  apierror.ApiError:
    properties:
      code:
        type: integer
      error: {}
    type: object
  db.Assignment:
    properties:
      course_id:
        type: integer
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      description:
        $ref: '#/definitions/pgtype.Text'
      due_date:
        $ref: '#/definitions/pgtype.Timestamp'
      id:
        type: integer
      max_attempts_per_task:
        $ref: '#/definitions/pgtype.Int4'
      start_date:
        $ref: '#/definitions/pgtype.Timestamp'
      title:
        type: string
      updated_at:
        $ref: '#/definitions/pgtype.Timestamp'
    type: object
  db.Course:
    properties:
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      description:
        $ref: '#/definitions/pgtype.Text'
      id:
        type: integer
      join_code:
        type: string
      name:
        type: string
      teacher_id:
        type: integer
      updated_at:
        $ref: '#/definitions/pgtype.Timestamp'
    type: object
  db.GetUsersLeaderboardRow:
    properties:
      elo:
        type: integer
      username:
        type: string
    type: object
  db.Grade:
    properties:
      assignment_id:
        type: integer
      feedback:
        $ref: '#/definitions/pgtype.Text'
      grade:
        type: integer
      graded_at:
        $ref: '#/definitions/pgtype.Timestamp'
      graded_by:
        $ref: '#/definitions/pgtype.Int4'
      id:
        type: integer
      task_id:
        type: integer
      user_id:
        type: integer
    type: object
  db.Task:
    properties:
      course_id:
        $ref: '#/definitions/pgtype.Int4'
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      description:
        type: string
      difficulty:
        type: integer
      id:
        type: integer
      is_public:
        type: boolean
      passes:
        type: integer
      score:
        type: number
      title:
        type: string
      topics:
        items:
          type: integer
        type: array
      updated_at:
        $ref: '#/definitions/pgtype.Timestamp'
      user_id:
        type: integer
    type: object
  db.TaskTestCase:
    properties:
      case_order:
        type: integer
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      id:
        type: integer
      input_file:
        type: string
      output_file:
        type: string
      task_id:
        type: integer
      updated_at:
        $ref: '#/definitions/pgtype.Timestamp'
    type: object
  db.Topic:
    properties:
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      id:
        type: integer
      name:
        type: string
      tasks_count:
        type: integer
    type: object
  db.UpdateTaskParams:
    properties:
      course_id:
        $ref: '#/definitions/pgtype.Int4'
      description:
        type: string
      difficulty:
        type: integer
      id:
        type: integer
      is_public:
        type: boolean
      passes:
        type: integer
      score:
        type: number
      title:
        type: string
      topics:
        items:
          type: integer
        type: array
    type: object
  db.User:
    properties:
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      elo:
        type: integer
      email:
        type: string
      id:
        type: integer
      password_hash:
        type: string
      roles:
        type: integer
      updated_at:
        $ref: '#/definitions/pgtype.Timestamp'
      username:
        type: string
    type: object
  models.AddTaskToAssignmentDTO:
    properties:
      order_index:
        minimum: 0
        type: integer
      task_id:
        type: integer
      weight:
        maximum: 5
        minimum: 0.1
        type: number
    required:
    - task_id
    type: object
  models.AssignmentResponse:
    properties:
      course:
        $ref: '#/definitions/db.Course'
      course_id:
        type: integer
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      description:
        $ref: '#/definitions/pgtype.Text'
      due_date:
        $ref: '#/definitions/pgtype.Timestamp'
      id:
        type: integer
      max_attempts_per_task:
        $ref: '#/definitions/pgtype.Int4'
      start_date:
        $ref: '#/definitions/pgtype.Timestamp'
      tasks:
        items:
          $ref: '#/definitions/models.TaskWithOrder'
        type: array
      title:
        type: string
      total_tasks:
        type: integer
      updated_at:
        $ref: '#/definitions/pgtype.Timestamp'
    type: object
  models.AssignmentStats:
    properties:
      average_grade:
        type: number
      completed_count:
        type: integer
      submissions_count:
        type: integer
      total_students:
        type: integer
    type: object
  models.AuthUserDTO:
    properties:
      identifier:
        type: string
      password:
        type: string
    required:
    - identifier
    - password
    type: object
  models.CourseResponse:
    properties:
      assignment_count:
        type: integer
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      description:
        $ref: '#/definitions/pgtype.Text'
      id:
        type: integer
      join_code:
        type: string
      name:
        type: string
      student_count:
        type: integer
      teacher:
        $ref: '#/definitions/db.User'
      teacher_id:
        type: integer
      updated_at:
        $ref: '#/definitions/pgtype.Timestamp'
    type: object
  models.CreateAssignmentDTO:
    properties:
      course_id:
        type: integer
      description:
        maxLength: 1000
        type: string
      due_date:
        type: string
      max_attempts_per_task:
        maximum: 100
        minimum: 1
        type: integer
      start_date:
        type: string
      title:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - course_id
    - title
    type: object
  models.CreateAttemptRequest:
    properties:
      assignment_id:
        type: integer
      code:
        type: string
      lang:
        type: string
      task_id:
        type: integer
    type: object
  models.CreateCourseDTO:
    properties:
      description:
        maxLength: 1000
        type: string
      name:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - name
    type: object
  models.CreateGradeDTO:
    properties:
      assignment_id:
        type: integer
      feedback:
        maxLength: 1000
        type: string
      grade:
        maximum: 5
        minimum: 1
        type: integer
      task_id:
        type: integer
      user_id:
        type: integer
    required:
    - assignment_id
    - grade
    - task_id
    - user_id
    type: object
  models.CreateTaskDTO:
    properties:
      course_id:
        type: integer
      description:
        type: string
      difficulty:
        type: integer
      is_public:
        type: boolean
      title:
        type: string
      topics:
        items:
          type: integer
        type: array
    type: object
  models.CreateUserDTO:
    properties:
      email:
        type: string
      password:
        description: Basic validation example
        minLength: 8
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  models.GetUserTaskAttemptsResponse:
    properties:
      assignment_id:
        type: integer
      code:
        type: string
      id:
        type: integer
      lang:
        type: string
      memory_usage:
        type: integer
      running_time:
        type: integer
      status:
        type: integer
      updated_at:
        type: string
    type: object
  models.GradeResponse:
    properties:
      assignment_id:
        type: integer
      assignment_title:
        type: string
      feedback:
        $ref: '#/definitions/pgtype.Text'
      grade:
        type: integer
      graded_at:
        $ref: '#/definitions/pgtype.Timestamp'
      graded_by:
        $ref: '#/definitions/pgtype.Int4'
      graded_by_username:
        type: string
      id:
        type: integer
      student_username:
        type: string
      task_id:
        type: integer
      task_title:
        type: string
      user_id:
        type: integer
    type: object
  models.GradeStats:
    properties:
      average_grade:
        type: number
      grade_distribution:
        additionalProperties:
          type: integer
        type: object
      highest_grade:
        type: integer
      lowest_grade:
        type: integer
    type: object
  models.GradeSummary:
    properties:
      assignment_id:
        type: integer
      assignment_title:
        type: string
      average_grade:
        type: number
      tasks_count:
        type: integer
    type: object
  models.JoinCourseDTO:
    properties:
      join_code:
        maxLength: 10
        minLength: 6
        type: string
    required:
    - join_code
    type: object
  models.NewTestCaseReq:
    properties:
      task_id:
        type: integer
    type: object
  models.StudentInCourse:
    properties:
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      elo:
        type: integer
      email:
        type: string
      enrolled_at:
        type: string
      grades:
        items:
          $ref: '#/definitions/models.GradeSummary'
        type: array
      id:
        type: integer
      password_hash:
        type: string
      role:
        type: string
      roles:
        type: integer
      updated_at:
        $ref: '#/definitions/pgtype.Timestamp'
      username:
        type: string
    type: object
  models.TaskByIdResponse:
    properties:
      course_id:
        $ref: '#/definitions/pgtype.Int4'
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      description:
        type: string
      difficulty:
        type: integer
      id:
        type: integer
      is_public:
        type: boolean
      passes:
        type: integer
      score:
        type: number
      test_cases:
        items:
          $ref: '#/definitions/db.TaskTestCase'
        type: array
      title:
        type: string
      topics:
        items:
          type: integer
        type: array
      updated_at:
        $ref: '#/definitions/pgtype.Timestamp'
      user_id:
        type: integer
    type: object
  models.TaskWithOrder:
    properties:
      course_id:
        $ref: '#/definitions/pgtype.Int4'
      created_at:
        $ref: '#/definitions/pgtype.Timestamp'
      description:
        type: string
      difficulty:
        type: integer
      id:
        type: integer
      is_public:
        type: boolean
      order_index:
        type: integer
      passes:
        type: integer
      score:
        type: number
      title:
        type: string
      topics:
        items:
          type: integer
        type: array
      updated_at:
        $ref: '#/definitions/pgtype.Timestamp'
      user_id:
        type: integer
      weight:
        type: number
    type: object
  models.UpdateAssignmentDTO:
    properties:
      description:
        maxLength: 1000
        type: string
      due_date:
        type: string
      max_attempts_per_task:
        maximum: 100
        minimum: 1
        type: integer
      start_date:
        type: string
      title:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - title
    type: object
  models.UpdateCourseDTO:
    properties:
      description:
        maxLength: 1000
        type: string
      name:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - name
    type: object
  pgtype.InfinityModifier:
    enum:
    - 1
    - 0
    - -1
    type: integer
    x-enum-varnames:
    - Infinity
    - Finite
    - NegativeInfinity
  pgtype.Int4:
    properties:
      int32:
        type: integer
      valid:
        type: boolean
    type: object
  pgtype.Text:
    properties:
      string:
        type: string
      valid:
        type: boolean
    type: object
  pgtype.Timestamp:
    properties:
      infinityModifier:
        $ref: '#/definitions/pgtype.InfinityModifier'
      time:
        description: Time zone will be ignored when encoding to PostgreSQL.
        type: string
      valid:
        type: boolean
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:4000
info:
  contact: {}
  title: Rankode
  version: "1.0"
paths:
  /assignments:
    get:
      consumes:
      - application/json
      description: Retrieves assignments for the current user (as teacher or student)
      parameters:
      - description: Filter by course ID
        in: query
        name: course_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of assignments
          schema:
            items:
              $ref: '#/definitions/db.Assignment'
            type: array
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuth: []
      summary: List assignments
      tags:
      - Assignments
    post:
      consumes:
      - application/json
      description: Creates a new assignment in a course (teacher only)
      parameters:
      - description: Assignment creation payload
        in: body
        name: assignment
        required: true
        schema:
          $ref: '#/definitions/models.CreateAssignmentDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created assignment
          schema:
            $ref: '#/definitions/db.Assignment'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "403":
          description: Forbidden (not teacher of course)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuth: []
      summary: Create a new assignment
      tags:
      - Assignments
  /assignments/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes an assignment (teacher only)
      parameters:
      - description: Assignment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: Assignment deleted successfully
        "403":
          description: Forbidden (not teacher of course)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "404":
          description: Assignment not found
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuth: []
      summary: Delete assignment
      tags:
      - Assignments
    get:
      consumes:
      - application/json
      description: Retrieves a single assignment by its ID with included tasks
      parameters:
      - description: Assignment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Assignment details
          schema:
            $ref: '#/definitions/models.AssignmentResponse'
        "404":
          description: Assignment not found
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuth: []
      summary: Get assignment by ID with tasks
      tags:
      - Assignments
    put:
      consumes:
      - application/json
      description: Updates an existing assignment (teacher only)
      parameters:
      - description: Assignment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Assignment update payload
        in: body
        name: assignment
        required: true
        schema:
          $ref: '#/definitions/models.UpdateAssignmentDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Assignment updated successfully
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "403":
          description: Forbidden (not teacher of course)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "404":
          description: Assignment not found
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuth: []
      summary: Update assignment
      tags:
      - Assignments
  /assignments/{id}/stats:
    get:
      consumes:
      - application/json
      description: Retrieves statistics for an assignment (teacher only)
      parameters:
      - description: Assignment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Assignment statistics
          schema:
            $ref: '#/definitions/models.AssignmentStats'
        "403":
          description: Forbidden (not teacher of course)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "404":
          description: Assignment not found
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuth: []
      summary: Get assignment statistics
      tags:
      - Assignments
  /assignments/{id}/tasks:
    post:
      consumes:
      - application/json
      description: Adds an existing task to an assignment (teacher only)
      parameters:
      - description: Assignment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Task addition payload
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/models.AddTaskToAssignmentDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Task added to assignment successfully
        "400":
          description: Bad request (task not in course, already added)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "403":
          description: Forbidden (not teacher of course)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "404":
          description: Assignment or task not found
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuth: []
      summary: Add task to assignment
      tags:
      - Assignments
  /assignments/{id}/tasks/{taskId}:
    delete:
      consumes:
      - application/json
      description: Removes a task from an assignment (teacher only)
      parameters:
      - description: Assignment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Task ID
        in: path
        name: taskId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Task removed from assignment successfully
        "403":
          description: Forbidden (not teacher of course)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "404":
          description: Assignment or task not found
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuth: []
      summary: Remove task from assignment
      tags:
      - Assignments
  /attempts:
    get:
      consumes:
      - application/json
      description: Retrieves all attempts submitted by the authenticated user for
        a given task.
      parameters:
      - description: Task ID
        in: query
        name: taskId
        required: true
        type: integer
      - description: Assignment ID
        in: query
        name: assignmentId
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of attempts
          schema:
            items:
              $ref: '#/definitions/models.GetUserTaskAttemptsResponse'
            type: array
        "400":
          description: Bad request (e.g., missing or invalid taskId)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuoth: []
      summary: List user’s attempts for a specific task
      tags:
      - Attempts
    post:
      consumes:
      - application/json
      description: Submits a new code attempt for execution against a task’s test
        cases.
      parameters:
      - description: Attempt creation payload
        in: body
        name: attempt
        required: true
        schema:
          $ref: '#/definitions/models.CreateAttemptRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Attempt queued successfully
        "400":
          description: Bad request (e.g., still running or invalid input)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuth: []
      summary: Create a new attempt
      tags:
      - Attempts
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email/username and password and returns
        a JWT upon success.
      parameters:
      - description: Authentication credentials payload
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/models.AuthUserDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Authentication successful, returns JWT
          schema:
            properties:
              token:
                type: string
            type: object
        "400":
          description: Bad request (e.g., invalid input)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "401":
          description: Unauthorized (invalid credentials)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      summary: Authenticate user and get token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new user with a username, email, and password.
      parameters:
      - description: User registration payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.CreateUserDTO'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully (sensitive data omitted)" // Adjust
            response type based on actual return
          schema:
            $ref: '#/definitions/db.User'
        "400":
          description: Bad request (e.g., invalid input, user already exists)
          schema:
            $ref: '#/definitions/apierror.ApiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Api'
      summary: Register a new user
      tags:
      - Auth
  /courses:
    get:
      consumes:
      - application/json
      description: Retrieves courses for the current user (as teacher or student)
      produces:
      - application/json
      responses:
        "200":
          description: List of courses
          schema:
            items:
              $ref: '#/definitions/db.Course'
            type: array
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apierror.ApiError'
      security:
      - ApiKeyAuth: []
      summary: List courses
      tags:
      - Courses
    post:
      consumes:
      - application/json
      description: Creates a new course (teacher only)
      parameters:
      - description: Course creation payload
        in: body
        name: course
        required: true
        schema:
          $ref: '#/definitions/models.CreateCourseDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created course
